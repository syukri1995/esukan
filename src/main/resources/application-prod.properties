# Production-oriented defaults (override via env on the host)
# TiDB / MySQL: set SPRING_DATASOURCE_URL, USERNAME, PASSWORD
# JWT: set ESUKAN_JWT_SECRET to a strong random value (32+ bytes)
# CORS: set ESUKAN_CORS_ALLOWED_ORIGINS to your Vercel site

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
