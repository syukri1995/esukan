# H2 in-memory when true; MySQL when false (set via system property esukan.db.use-h2 or env ESUKAN_DB_USE_H2)
esukan.db.use-h2=true

esukan.db.h2.url=jdbc:h2:mem:esukan;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
esukan.db.h2.user=sa
esukan.db.h2.password=

esukan.db.mysql.url=jdbc:mysql://localhost:3306/esukan_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kuala_Lumpur
esukan.db.mysql.user=root
esukan.db.mysql.password=

# JWT HS256 — must be >= 32 bytes
esukan.jwt.secret=01234567890123456789012345678901-change-in-production
esukan.jwt.expiration-ms=86400000

esukan.auth.allow-lecturer-self-register=true
