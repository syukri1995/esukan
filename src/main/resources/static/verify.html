<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sukan — Verify Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .verify-card {
            background: #fff;
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        .verify-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .status-verified {
            color: #27ae60;
        }
        .status-invalid {
            color: #e74c3c;
        }
        .verify-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .details-box {
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #27ae60;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .detail-label {
            color: #666;
            font-weight: 500;
        }
        .detail-value {
            color: #2c3e50;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="verify-card" id="verifyCard">
        <div class="verify-icon">⌛</div>
        <div class="verify-title">Verifying Payment...</div>
        <p style="color: #666;">Please wait while we check our records.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        const card = document.getElementById('verifyCard');

        if (!refId) {
            showError("No Reference ID", "The URL is missing a payment reference ID.");
        } else {
            fetch(`/api/verify-payment/${refId}`)
                .then(res => {
                    if (!res.ok) {
                        return res.json().then(err => { throw new Error(err.error || 'Server error'); });
                    }
                    return res.json();
                })
                .then(data => {
                    if (data.error || data.status !== 'PAID') {
                        showError("Verification Failed", data.error || "This payment is not marked as PAID.");
                    } else {
                        showSuccess(data);
                    }
                })
                .catch(err => {
                    showError("Error", "Could not connect to verification server or " + (err.message || err));
                });
        }

        function showError(title, message) {
            card.innerHTML = `
                <div class="verify-icon status-invalid">✖</div>
                <div class="verify-title">${title}</div>
                <p style="color: #666;">${message}</p>
            `;
        }

        function showSuccess(data) {
            const amt = typeof data.amount === 'number' ? data.amount.toFixed(2) : data.amount;
            let dateStr = 'N/A';
            if (data.paidAt) {
                const parsedDate = new Date(data.paidAt);
                if (!isNaN(parsedDate.getTime())) {
                    dateStr = parsedDate.toLocaleString();
                }
            }

            card.innerHTML = `
                <div class="verify-icon status-verified">✔</div>
                <div class="verify-title">Payment Verified</div>
                <p style="color: #27ae60; font-weight: 600;">Official Receipt</p>
                <div class="details-box">
                    <div class="detail-row">
                        <span class="detail-label">Ref ID</span>
                        <span class="detail-value">${data.referenceId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Amount Paid</span>
                        <span class="detail-value">RM ${amt}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Method</span>
                        <span class="detail-value">${data.method || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date & Time</span>
                        <span class="detail-value">${dateStr}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Name</span>
                        <span class="detail-value">${data.studentName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">${data.type === 'BOOKING' ? 'Facility' : 'Equipment'}</span>
                        <span class="detail-value">${data.type === 'BOOKING' ? data.facilityName : data.equipmentName}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
